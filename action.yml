name: pr-scout
description: AI-powered checks for pull requests

inputs:
  check:
    description: Which check to run (e.g. spec-audit)
    required: true
  ignore:
    description: Comma-separated globs for paths that don't require a spec update
    default: ""

runs:
  using: composite
  steps:
    - name: Run check
      shell: bash
      run: |
        script="${{ inputs.check }}"
        script="${script//-/_}.py"
        args=("${{ github.workspace }}" \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")
        if [ -n "${{ inputs.ignore }}" ]; then
          args+=(--ignore "${{ inputs.ignore }}")
        fi
        python "${{ github.action_path }}/${script}" "${args[@]}" \
          > "$RUNNER_TEMP/pr-scout-${{ inputs.check }}.json"

    - name: Post PR comment
      shell: bash
      run: |
        result="$RUNNER_TEMP/pr-scout-${{ inputs.check }}.json"
        if [ ! -s "$result" ]; then
          echo "No output — skipped."
          exit 0
        fi
        echo "--- pr-scout result ---"
        jq . "$result"
        echo "---"

        comment=$(jq -r .comment "$result")
        gh pr comment "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          --body "$comment"
      env:
        GH_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: Check result
      shell: bash
      run: |
        result="$RUNNER_TEMP/pr-scout-${{ inputs.check }}.json"
        if [ ! -s "$result" ]; then
          exit 0
        fi
        status=$(jq -r .status "$result")
        if [ "$status" = "fail" ] || [ "$status" = "missing_spec_update" ]; then
          echo "::error::spec-audit status: $status"
          exit 1
        fi
